<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON FIRE 🔥</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#FF3B3F,#FF6A00);
color:white;
text-align:center;
}

.container{
margin-top:80px;
}

input{
padding:12px;
margin:8px;
border:none;
border-radius:20px;
width:220px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#FF3B3F;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
display:inline-block;
}
</style>
</head>

<body>

<div class="container">
<h1>🔥 ON FIRE</h1>

<div class="card">

<h3>Register</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="register()">Create Account</button>

<hr style="margin:20px 0;">

<h3>Login</h3>
<button onclick="login()">Sign In</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://syoytuvgmtzuskdgxpyi.supabase.co",
"sb_publishable_E5INvJXmuMlzf2LZaGhuoQ_mNMJCZyQ"
);

async function register(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signUp({
email: email,
password: password,
});

if(error){
alert(error.message);
}else{
alert("Account created 🔥");
}
}

async function login(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password,
});

if(error){
alert(error.message);
}else{
alert("Welcome to ON FIRE 🔥");
}
}

</script>

</body>
</html>
